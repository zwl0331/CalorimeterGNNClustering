# CaloClusterNet (Stage 1) for FlateMinusMixLow-KL Run1B retraining (Task 18e).
# Mirrors configs/calo_cluster_net.yaml; only data paths + splits + norm-stats
# differ to keep MDC2025 artifacts intact.
#
# Usage (GPU node):
#   python3 scripts/train_gnn.py --config configs/calo_cluster_net_run1b_mixlow.yaml \
#       --device cuda --run-name calo_cluster_net_run1b_mixlow_stage1

data:
  crystal_geometry: data/crystal_geometry.csv
  crystal_neighbors: data/crystal_neighbors.csv
  processed_dir:  data/processed_run1b_mixlow/
  normalization_stats: data/normalization_stats_run1b_mixlow.pt
  splits:
    train: splits/run1b_mixlow_train_files.txt
    val:   splits/run1b_mixlow_val_files.txt
    test:  splits/run1b_mixlow_test_files.txt

graph:
  r_max_mm: 210.0
  dt_max_ns: 25.0
  k_min: 3
  k_max: 20
  use_topology_graph: false

model:
  name: CaloClusterNet
  hidden_dim: 96
  n_mp_layers: 4
  dropout: 0.1

train:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: plateau
  epochs: 100
  early_stop_patience: 15
  batch_size: 32
  neg_pos_ratio: 5
  lambda_edge: 1.0
  lambda_node: 0.0
  lambda_cons: 0.0

inference:
  tau_node: 0.5
  tau_edge: 0.20
  min_hits: 2
  min_energy_mev: 10.0

output:
  run_dir: outputs/runs/
  checkpoint_dir: checkpoints/
  debug_dir: outputs/debug/
