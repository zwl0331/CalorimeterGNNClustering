# CaloClusterNet with learned node saliency for bridge-hit identification
# Resume from Stage 1 best checkpoint. Node saliency labels redefined:
# y_node=1 for multi-hit cluster members, y_node=0 for singletons/ambiguous.
#
# Usage (GPU node):
#   python3 scripts/train_gnn.py --config configs/calo_cluster_net_saliency.yaml \
#     --device cuda --run-name calo_cluster_net_v2_saliency \
#     --resume outputs/runs/calo_cluster_net_v2_stage1/checkpoints/best_model.pt

data:
  crystal_geometry: data/crystal_geometry.csv
  crystal_neighbors: data/crystal_neighbors.csv
  processed_dir:  data/processed/
  normalization_stats: data/normalization_stats.pt
  splits:
    train: splits/train_files.txt
    val:   splits/val_files.txt
    test:  splits/test_files.txt

graph:
  r_max_mm: 210.0
  dt_max_ns: 25.0
  k_min: 3
  k_max: 20
  use_topology_graph: false

model:
  name: CaloClusterNet
  hidden_dim: 96
  n_mp_layers: 4
  dropout: 0.1

train:
  optimizer: adamw
  lr: 5.0e-4
  weight_decay: 1.0e-4
  scheduler: plateau
  epochs: 100
  early_stop_patience: 15
  batch_size: 32
  neg_pos_ratio: 5
  # Edge + node saliency (new multi-hit labels)
  lambda_edge: 1.0
  lambda_node: 0.3
  lambda_cons: 0.0

inference:
  tau_node: 0.5
  tau_edge: 0.14
  min_hits: 2
  min_energy_mev: 10.0

output:
  run_dir: outputs/runs/
  checkpoint_dir: checkpoints/
  debug_dir: outputs/debug/
