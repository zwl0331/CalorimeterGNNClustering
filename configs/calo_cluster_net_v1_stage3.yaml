# CaloClusterNetV1 Stage 3: edge + node saliency + consistency regularizer
# Resume from Stage 2 best checkpoint.
#
# Usage (GPU node):
#   python3 scripts/train_gnn.py --config configs/calo_cluster_net_v1_stage3.yaml \
#     --device cuda --run-name calo_cluster_net_v1_stage3 \
#     --resume outputs/runs/calo_cluster_net_v1_stage2/checkpoints/best_model.pt

data:
  crystal_geometry: data/crystal_geometry.csv
  crystal_neighbors: data/crystal_neighbors.csv
  processed_dir:  data/processed/
  normalization_stats: data/normalization_stats.pt
  splits:
    train: splits/train_files.txt
    val:   splits/val_files.txt
    test:  splits/test_files.txt

graph:
  r_max_mm: 210.0
  dt_max_ns: 25.0
  k_min: 3
  k_max: 20
  use_topology_graph: false

model:
  name: CaloClusterNetV1
  hidden_dim: 96
  n_mp_layers: 4
  dropout: 0.1

train:
  optimizer: adamw
  lr: 2.0e-4
  weight_decay: 1.0e-4
  scheduler: plateau
  epochs: 100
  early_stop_patience: 15
  batch_size: 32
  neg_pos_ratio: 5
  # Stage 3: edge + node + consistency
  lambda_edge: 1.0
  lambda_node: 0.3
  lambda_cons: 0.05

inference:
  tau_node: 0.5
  tau_edge: 0.34
  min_hits: 2
  min_energy_mev: 10.0

output:
  run_dir: outputs/runs/
  checkpoint_dir: checkpoints/
  debug_dir: outputs/debug/
